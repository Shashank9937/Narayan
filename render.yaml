services:
  - type: web
    name: company-ops-dashboard
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_MODE
        value: postgres
      - key: SUPABASE_DATABASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
